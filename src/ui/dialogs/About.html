<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>About RcloneTray</title>
  <link rel="stylesheet" href="../styles/about.css">
</head>
<body>
  <div class="drag-strip"></div>
  <main>
    <img src="../icons/source-icon-color.png" width="84" height="84" alt="RcloneTray" class="app-icon">

    <h1 id="app-name">RcloneTray</h1>
    <a class="version-pill" id="app-version-link" href="https://github.com/ysalitrynskyi/RcloneTray/releases" target="_blank" rel="noopener">
      <span id="app-version-content">…</span>
    </a>

    <p class="tagline">System-tray manager for Rclone — mount, sync &amp; serve your remotes.</p>

    <div class="engine">
      <span>Rclone engine</span>
      <code id="rclone-version">checking…</code>
    </div>

    <div class="actions">
      <button class="primary" id="btn-updates">Check for updates</button>
      <div class="action-row">
        <button class="ghost" id="btn-issue">Report an issue</button>
        <button class="ghost" id="btn-license">License</button>
      </div>
    </div>

    <footer class="credits">
      <span>Built by <a href="https://github.com/ysalitrynskyi" target="_blank" rel="noopener">Yevhen Salitrynskyi</a></span>
      <span>Originally by <a href="https://github.com/dimitrov-adrian" target="_blank" rel="noopener">Adrian Dimitrov</a></span>
    </footer>
  </main>

  <script>
    function openUrl(url) { window.open(url, '_blank', 'noopener'); }
    document.getElementById('btn-updates').addEventListener('click', () => openUrl('https://github.com/ysalitrynskyi/RcloneTray/releases'));
    document.getElementById('btn-issue').addEventListener('click', () => openUrl('https://github.com/ysalitrynskyi/RcloneTray/issues'));
    document.getElementById('btn-license').addEventListener('click', () => openUrl('https://github.com/ysalitrynskyi/RcloneTray/blob/master/LICENSE.txt'));
    document.getElementById('app-version-link').addEventListener('click', (e) => { e.preventDefault(); openUrl('https://github.com/ysalitrynskyi/RcloneTray/releases'); });

    (async function init() {
      try {
        const [appName, appVersion, rcloneVersion] = await Promise.all([
          $main.app.getName(),
          $main.app.getVersion(),
          $main.rclone.version()
        ]);
        document.getElementById('app-name').textContent = appName || 'RcloneTray';
        document.getElementById('app-version-content').textContent = 'v' + (appVersion || '?');
        document.getElementById('rclone-version').textContent = rcloneVersion || 'not found';
      } catch (error) {
        console.error('Failed to load app info:', error);
        document.getElementById('rclone-version').textContent = 'unavailable';
      }
    })();
  </script>
</body>
</html>
