<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit Bookmark</title>
  <link rel="stylesheet" href="../styles/ui.css">
</head>
<body>
  <form id="the-form" class="form">
    <div class="header">
      <div class="avatar" id="bookmark-icon"></div>
      <div class="header-text">
        <h1 id="bookmark-name">Loading…</h1>
        <div class="type" id="bookmark-type"></div>
      </div>
    </div>

    <div class="body">
      <div id="bookmark-settings">
        <div class="state">Loading settings <span class="spinner"></span></div>
      </div>

      <div class="tip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>Use the <strong>Advanced</strong> tab for provider-specific options. Mount read/write behaviour is set in <strong>Preferences → Rclone → VFS cache mode</strong>.</span>
      </div>
    </div>

    <div class="footer">
      <button type="button" class="btn-danger" id="delete-btn">Delete</button>
      <button type="submit">Save changes</button>
    </div>
  </form>

  <script>
    (async function () {
      const theForm = document.getElementById('the-form');
      const settingsWrap = document.getElementById('bookmark-settings');
      const deleteBtn = document.getElementById('delete-btn');

      const PALETTE = [
        'oklch(0.6 0.17 265)', 'oklch(0.62 0.16 150)', 'oklch(0.68 0.16 60)',
        'oklch(0.6 0.18 320)', 'oklch(0.6 0.2 20)', 'oklch(0.58 0.15 240)',
        'oklch(0.64 0.13 195)', 'oklch(0.55 0.12 30)', 'oklch(0.6 0.17 295)'
      ];
      function colorFor(t) {
        let h = 0;
        for (let i = 0; i < (t || '').length; i++) h = (h * 31 + t.charCodeAt(i)) >>> 0;
        return PALETTE[h % PALETTE.length];
      }

      try {
        const props = await $main.getProps();
        if (!props || !props.$name) throw new Error('Invalid bookmark data');

        document.getElementById('bookmark-name').textContent = props.$name;
        document.getElementById('bookmark-type').textContent = props.type || 'unknown';
        const icon = document.getElementById('bookmark-icon');
        icon.style.background = colorFor(props.type || props.$name);
        icon.textContent = (props.$name || 'B')[0];
        document.title = `Edit: ${props.$name}`;

        window.api.renderBookmarkSettings(settingsWrap, props.type, { options: props });

        theForm.addEventListener('submit', async function (event) {
          event.preventDefault();
          const data = window.electronAPI.getTheFormData(this);
          try {
            await $main.rclone.updateBookmark(props.$name, data.options || {});
            window.close();
          } catch (error) {
            window.electronAPI.errorBox(error.message || String(error));
          }
        });

        deleteBtn.addEventListener('click', async function () {
          const confirmed = await window.electronAPI.confirm(
            `Delete “${props.$name}”?\n\nThis can't be undone.`
          );
          if (!confirmed) return;
          try {
            await $main.rclone.delBookmark(props.$name);
            window.close();
          } catch (error) {
            window.electronAPI.errorBox(error.message || String(error));
          }
        });
      } catch (error) {
        console.error('Failed to load bookmark:', error);
        settingsWrap.textContent = '';
        const div = document.createElement('div');
        div.className = 'state error';
        div.textContent = 'Failed to load bookmark: ' + (error.message || error);
        settingsWrap.appendChild(div);
      }
    })();
  </script>
</body>
</html>
